  </defs>

  <!-- Badge -->
  <rect x="0" y="4" width="46" height="46" rx="11" fill="url(#g2)"/>
  <line x1="0" y1="38" x2="15" y2="50" stroke="rgba(255,255,255,0.07)" stroke-width="14"/>

  <!-- Monograma RJ -->
  <text x="23" y="35"
