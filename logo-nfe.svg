<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" width="380" height="80">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="135%" y2="135%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Badge quadrado arredondado -->
  <rect x="0" y="8" width="64" height="64" rx="16" fill="url(#g1)"/>

  <!-- Detalhe: linha fina diagonal decorativa no badge -->
  <line x1="0" y1="58" x2="22" y2="72" stroke="rgba(255,255,255,0.08)" stroke-width="18"/>

  <!-- Monograma RJ — tipografia, não desenho manual -->
  <text x="32" y="50"
    font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
    font-size="28" font-weight="900"
    fill="white" text-anchor="middle" letter-spacing="-1">RJ</text>

  <!-- Separador vertical -->
  <line x1="80" y1="14" x2="80" y2="66" stroke="#d1d9e6" stroke-width="1.5"/>

  <!-- Nome principal: Tecnologia -->
  <text x="96" y="36"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="24" font-weight="800"
    fill="#0f172a" letter-spacing="-0.3">Tecnologia</text>

  <!-- Subtítulo: Logística & Soluções -->
  <text x="97" y="57"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="11" font-weight="400"
    fill="#64748b" letter-spacing="2.8">LOGÍSTICA &amp; SOLUÇÕES</text>

  <!-- Ponto azul de destaque antes do subtítulo -->
  <circle cx="88" cy="53" r="2.5" fill="#2563eb"/>
</svg>
